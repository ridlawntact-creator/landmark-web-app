version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.1
  aws-eks: circleci/aws-eks@2.2
  kubernetes: circleci/kubernetes@1.3

jobs:
  test-and-build:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: npm ci
      - run:
          name: Run frontend tests
          command: npm test
      - run:
          name: Build frontend
          command: npm run build
      - run:
          name: Install server dependencies
          command: cd server && npm ci
      - run:
          name: Run server tests
          command: cd server && npm test

  deploy-dev:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - setup_remote_docker
      - aws-cli/install
      - kubernetes/install-kubectl
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo "$DOCKERHUB_PASSWORD" | docker login --username ridlawntact --password-stdin
            docker build -t ridlawntact/landmark-web-app:$IMAGE_TAG .
            docker push ridlawntact/landmark-web-app:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (develop namespace)
          command: |
            source $BASH_ENV
            aws eks update-kubeconfig --name landmark-eks --region us-east-1
            sed -i 's/name: landmark/name: develop/g' k8s/namespace.yml
            sed -i 's/namespace: landmark/namespace: develop/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: ridlawntact/landmark-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/namespace.yml
            kubectl apply -f k8s/

  deploy-stg:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - setup_remote_docker
      - aws-cli/install
      - kubernetes/install-kubectl
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo "$DOCKERHUB_PASSWORD" | docker login --username ridlawntact --password-stdin
            docker build -t ridlawntact/landmark-web-app:$IMAGE_TAG .
            docker push ridlawntact/landmark-web-app:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (staging namespace)
          command: |
            source $BASH_ENV
            aws eks update-kubeconfig --name landmark-eks --region us-east-1
            sed -i 's/name: landmark/name: staging/g' k8s/namespace.yml
            sed -i 's/namespace: landmark/namespace: staging/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: ridlawntact/landmark-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/namespace.yml
            kubectl apply -f k8s/

  deploy-prod:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - setup_remote_docker
      - aws-cli/install
      - kubernetes/install-kubectl
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo "$DOCKERHUB_PASSWORD" | docker login --username ridlawntact --password-stdin
            docker build -t ridlawntact/landmark-web-app:$IMAGE_TAG .
            docker push ridlawntact/landmark-web-app:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (production namespace)
          command: |
            source $BASH_ENV
            aws eks update-kubeconfig --name landmark-eks --region us-east-1
            sed -i 's/name: landmark/name: production/g' k8s/namespace.yml
            sed -i 's/namespace: landmark/namespace: production/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: ridlawntact/landmark-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/namespace.yml
            kubectl apply -f k8s/

workflows:
  build-and-deploy:
    jobs:
      - test-and-build
      - deploy-dev:
          context: develop
          requires:
            - test-and-build
          filters:
            branches:
              only: develop
      - deploy-stg:
          context: staging
          requires:
            - test-and-build
          filters:
            branches:
              only: /^release.*/
      - deploy-prod:
          context: production
          requires:
            - test-and-build
          filters:
            branches:
              only:
                - main
                - /^hotfix.*/
                